        by `circuits[].gateset`.

        '
      example:
        type: ionq.multi-circuit.v1
        backend: simulator
        shots: 500
        input:
          gateset: native
          qubits: 2
          circuits:
          - name: qis circuit override
            gateset: qis
            circuit:
            - gate: h
              target: 0
            - gate: cnot
              target: 0
              control: 1
          - name: native circuit from parent
            circuit:
            - gate: ms
