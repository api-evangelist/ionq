          items:
            anyOf:
            - $ref: '#/components/schemas/QISCircuit'
            - $ref: '#/components/schemas/NativeCircuit'
          type: array
        qubits:
          type: integer
          format: int32
          minimum: 1
      required:
      - gateset
      - circuits
      type: object
    MultiCircuitJobCreationPayload:
      properties:
