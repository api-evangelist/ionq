          $ref: '#/components/schemas/JobMetadata'
          description: User defined metadata
        shots:
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000000
        backend:
          $ref: '#/components/schemas/JobBackends'
        session_id:
          type: string
        settings:
          properties:
            error_mitigation:
              properties:
                debiasing:
