      - x
      - y
      - z
      - rx
      - ry
      - rz
      - h
      - s
      - si
      - v
      - vi
      - t
      - ti
      - not
      - cnot
      - swap
      - xx
      - yy
      - zz
      - pauliexp
    Gate_QisGate:
      properties:
        gate:
          $ref: '#/components/schemas/QisGate'
        target:
          type: integer
          format: int32
        targets:
          items:
            type: number
            format: double
          type: array
          description: The qubits that a quantum gate is applied to
        controls:
          items:
            type: number
            format: double
          type: array
          description: The qubits that determine whether the operation is applied to targets.
        control:
          type: integer
          format: int32
        rotation:
          type: number
          format: double
          description: Rotation angle for rx/ry/rz gates
      required:
      - gate
      type: object
      additionalProperties: false
    QisCircuitInput:
      properties:
