          \ \\\n  -H \"Authorization: apiKey your-api-key\"\n"
components:
  schemas:
    BadRequestError:
      description: Error when a bad client request was received.
      properties:
        error:
          description: A short error type descrption.
          type: string
        message:
          description: A helpful error message.
          type: string
        statusCode:
          description: The HTTP status code for this error.
          type: integer
        validation:
          $ref: '#/components/schemas/RequestValidation'
      required:
      - statusCode
      - error
      - message
      type: object
    Error:
      description: Basic API error response.
      properties:
        error:
          description: A short error type descrption.
          type: string
        message:
          description: A helpful error message.
          type: string
        statusCode:
          description: The HTTP status code for this error.
          type: integer
      required:
      - statusCode
      - error
      - message
      type: object
    RequestValidation:
      description: Request validation failure details.
      properties:
        keys:
          description: A list of request payload keys which have bad values.
          items:
            type: string
          type: array
        source:
          description: Location in the request of the bad value(s).
          type: string
      type: object
    Whoami:
      description: Details of current API Key session.
      properties:
        key_id:
          $ref: '#/components/schemas/key-id'
        key_name:
          $ref: '#/components/schemas/key-name'
        project_id:
          $ref: '#/components/schemas/project-id'
      required:
      - key_id
      - key_name
      type: object
    key-id:
      description: UUID of a API key.
      example: e060759f-4348-4767-a645-8c0301265791
      format: uuid
      type: string
    key-name:
      description: key name.
      example: My First Key
      type: string
    project-id:
      description: UUID of a project.
      example: 944904d6-2e30-4cfb-8bc4-04afaabcdd42
      format: uuid
      type: string
    Backend:
      description: A backend that you can target your program to run on.
      properties:
        average_queue_time:
          description: Current wait time on the queue for execution.
          example: 1181215
          format: unix-timestamp
          type: number
        backend:
          description: 'Specifies target hardware and generation where applies: `simulator`, `qpu.aria-1`, `qpu.aria-2`, `qpu.forte-1`,
            `qpu.forte-enterprise-1`, `qpu.forte-enterprise-2`, `qpu.forte-enterprise-3`'
          example: qpu.aria-1
          type: string
        characterization_id:
          description: Current characterization ID for this backend
          example: 617a1f8b-59d4-435d-aa33-695433d7155e
          type: string
        degraded:
          description: Flag to tell if the backend is degraded or not.
          type: boolean
        kw:
          description: The amount of energy used by the backend in kilowatt-hours.
          example: 4902.81
          format: double
          type: number
        last_updated:
          description: Last date time the backend status was updated.
          example: '2025-06-16T00:00:00Z'
          type: string
        location:
          description: The location of the backend.
          example: College Park, MD, USA
          type: string
        qubits:
          description: The number of qubits available.
          example: 25
          minimum: 0
          type: integer
        status:
          description: 'Current status of the backend: `available`, `unavailable`, `retired`.'
          type: string
      required:
      - backend
      - status
      - qubits
      - average_queue_time
      - last_updated
      type: object
    Characterization:
      description: Quantum hardware characterization data.
      properties:
        backend:
          description: 'The backend calibrated hardware: `simulator`, `qpu.aria-1`, `qpu.aria-2`, `qpu.forte-1`, `qpu.forte-enterprise-1`,
            `qpu.forte-enterprise-2`, `qpu.forte-enterprise-3`'
          type: string
        connectivity:
          description: An array of valid, unordered tuples of possible qubits for executing two-qubit gates (e.g., `[[0, 1],
            [0, 2], [1, 2]]`)
          example:
          - - 0
            - 1
          - - 0
            - 2
          - - 10
            - 9
          items:
            items:
              type: integer
            type: array
          type: array
        date:
          description: Date time of the measurement, in ISO format.
          example: '2025-06-16T00:00:00Z'
          type: string
        fidelity:
          description: 'Fidelity for single-qubit (`1q`) and two-qubit (`2q`) gates, and State Preparation and Measurement
            (`spam`) operations.

            Currently provides only median fidelity; additional statistical data will be added in the future.

            '
          properties:
            spam:
              description: SPAM error correction information.
              properties:
                median:
                  example: 0.9962
                  type: number
                stderr:
                  description: SPAM error.
                  example: null
                  minimum: 0
                  type: integer
              required:
              - median
              type: object
          required:
          - spam
          type: object
        id:
          description: UUID of the characterization.
          format: uuid
          type: string
        qubits:
          description: The number of qubits available.
          example: 25
          minimum: 1
          type: integer
        timing:
          description: 'Time, in seconds, of various system properties: `t1` time, `t2` time, `1q` gate time, `2q` gate time,
            `readout` time, and qubit `reset` time.'
          properties:
            1q:
              type: integer
            2q:
              type: integer
            readout:
              description: Readout time.
              type: integer
            reset:
              description: qubit reset time.
              type: integer
            t1:
              example: 10
              type: integer
            t2:
              example: 1
              type: integer
          required:
          - readout
          - reset
          type: object
      type: object
    pagination-limit:
      default: 25
      description: How many objects to return.
      maximum: 25
      minimum: 1
      type: integer
    pagination-next:
      description: ID of next batch of resources to load.
      format: uuid
      type: string
    pagination-page:
      default: 1
      description: Specify the page of results to return.
      minimum: 1
      type: integer
    JobStatus:
      type: string
      enum:
      - submitted
      - ready
      - started
      - canceled
      - failed
      - completed
    JobCreationResponse:
      properties:
        id:
          type: string
          example: 617a1f8b-59d4-435d-aa33-695433d7155e
        status:
          $ref: '#/components/schemas/JobStatus'
        session_id:
          type: string
          nullable: true
          example: null
      required:
      - id
      - status
      - session_id
      type: object
      additionalProperties: false
    QisGate:
      type: string
