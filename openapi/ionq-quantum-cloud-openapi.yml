      - zz
      - ms
      - gpi
      - gpi2
      - nop
    Gate_NativeGate:
      properties:
        gate:
          $ref: '#/components/schemas/NativeGate'
        target:
          type: integer
          format: int32
        targets:
          items:
            type: number
            format: double
          type: array
          description: The qubits that a quantum gate is applied to
        controls:
          items:
            type: number
            format: double
          type: array
          description: The qubits that determine whether the operation is applied to targets.
        phase:
          type: number
          format: double
          description: Phase for gpi/gpi2 gates
        phases:
          items:
            type: number
