        shots:
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000000
        backend:
          $ref: '#/components/schemas/JobBackends'
        session_id:
          type: string
        settings:
          properties:
            error_mitigation:
              properties:
                debiasing:
                  type: boolean
              type: object
              description: To turn on debiasing, you must request at least 500 shots
            compilation:
              properties:
                opt:
                  type: number
                  format: double
                precision:
                  type: string
              type: object
          type: object
        dry_run:
          type: boolean
        noise:
          $ref: '#/components/schemas/Noise'
        type:
          type: string
          enum:
          - ionq.circuit.v1
          nullable: false
        input:
          $ref: '#/components/schemas/JsonCircuitInput'
      required:
      - backend
      - type
      - input
      type: object
      additionalProperties: false
    Registers:
      properties: {}
      type: object
      additionalProperties:
        items:
          type: number
          format: double
          nullable: true
        type: array
    QISCircuit:
      properties:
        name:
          type: string
        circuit:
          items:
            $ref: '#/components/schemas/Gate_QisGate'
          type: array
          description: Circuit gates. Can be either QIS gates or Native gates depending on the gateset property.
        qubits:
          type: integer
          format: int32
        registers:
          $ref: '#/components/schemas/Registers'
          description: Registers to use in your circuit. Each register is a list of qubit indices (starting from zero).
        gateset:
          type: string
