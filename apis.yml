  description: REST API for submitting quantum circuits, managing jobs and sessions, inspecting backends and
    characterizations, and tracking cost and usage on the IonQ Quantum Cloud. Backends include the qpu.aria-1,
    qpu.aria-2, qpu.forte-1, qpu.forte-enterprise-1 trapped-ion QPUs and the IonQ noisy/ideal simulator
    (up to 29 qubits). Supports single-circuit, multi-circuit, native-gate, QAOA, and Quantum Function jobs.
    Authentication via Authorization header `apiKey $IONQ_API_KEY`.
