description: IonQ (NYSE IONQ) is a College Park, Maryland-based public trapped-ion quantum computing company.
  IonQ designs, manufactures, and operates trapped-ion quantum computers (Aria, Forte, Forte Enterprise, Tempo,
  Harmony) and delivers them through the IonQ Quantum Cloud REST API, on-premises Forte Enterprise systems, and
  partner clouds (AWS Braket, Microsoft Azure Quantum, Google Cloud). The platform supports submission of QIS
  and native-gate circuits, multi-circuit and Quantum Function jobs, reserved Sessions, error mitigation, and
  organization-level usage and cost reporting. IonQ's quantum networking, security (QKD), sensing, and
  space-infrastructure businesses extend the trapped-ion core into a broader quantum systems portfolio.
